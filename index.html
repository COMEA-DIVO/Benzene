<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第六战队 - 苯战队</title>
    <style>
        :root {
            /* 浅色模式变量 */
            --bg-primary: #f6f8fa;
            --bg-card: #ffffff;
            --bg-nav: #ffffff;
            --bg-input: #f6f8fa;
            --bg-modal-overlay: rgba(0, 0, 0, 0.5);
            --bg-toast: #1f2328;
            --border-color: #d0d7de;
            --border-color-subtle: #e8ecf0;
            --text-primary: #1f2328;
            --text-secondary: #656d76;
            --text-tertiary: #8b949e;
            --text-link: #0969da;
            --text-toast: #ffffff;
            --accent-blue: #0969da;
            --accent-blue-bg: #ddf4ff;
            --accent-green: #1a7f37;
            --accent-green-bg: #dafbe1;
            --accent-orange: #bc4c00;
            --accent-orange-bg: #fff1e5;
            --accent-purple: #8250df;
            --accent-purple-bg: #fbefff;
            --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.06);
            --shadow-card-hover: 0 4px 12px rgba(0, 0, 0, 0.08), 0 2px 4px rgba(0, 0, 0, 0.06);
            --shadow-nav: 0 1px 3px rgba(0, 0, 0, 0.04);
            --shadow-modal: 0 8px 32px rgba(0, 0, 0, 0.2);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-full: 50%;
            --transition-fast: 0.15s ease;
            --transition-normal: 0.25s ease;
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', 'Menlo', monospace;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            --nav-height: 60px;
            --avatar-bg-1: #e3f2fd;
            --avatar-text-1: #1565c0;
            --avatar-bg-2: #fce4ec;
            --avatar-text-2: #c62828;
            --avatar-bg-3: #e8f5e9;
            --avatar-text-3: #2e7d32;
            --avatar-bg-4: #fff3e0;
            --avatar-text-4: #e65100;
            --avatar-bg-5: #f3e5f5;
            --avatar-text-5: #6a1b9a;
            --avatar-bg-6: #e0f7fa;
            --avatar-text-6: #00695c;
        }

        body.dark {
            --bg-primary: #0d1117;
            --bg-card: #161b22;
            --bg-nav: #161b22;
            --bg-input: #0d1117;
            --bg-modal-overlay: rgba(0, 0, 0, 0.7);
            --bg-toast: #e6edf3;
            --border-color: #30363d;
            --border-color-subtle: #21262d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-tertiary: #6e7681;
            --text-link: #58a6ff;
            --text-toast: #0d1117;
            --accent-blue: #58a6ff;
            --accent-blue-bg: #121d2f;
            --accent-green: #3fb950;
            --accent-green-bg: #12261e;
            --accent-orange: #d29922;
            --accent-orange-bg: #1f1a0b;
            --accent-purple: #a371f7;
            --accent-purple-bg: #1b1528;
            --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.3), 0 1px 2px rgba(0, 0, 0, 0.2);
            --shadow-card-hover: 0 4px 16px rgba(0, 0, 0, 0.45), 0 2px 6px rgba(0, 0, 0, 0.3);
            --shadow-nav: 0 1px 3px rgba(0, 0, 0, 0.4);
            --shadow-modal: 0 8px 40px rgba(0, 0, 0, 0.55);
            --avatar-bg-1: #1a2f44;
            --avatar-text-1: #79c0ff;
            --avatar-bg-2: #3d1f28;
            --avatar-text-2: #ff7b9c;
            --avatar-bg-3: #1a3320;
            --avatar-text-3: #56d364;
            --avatar-bg-4: #2e1f0f;
            --avatar-text-4: #e09f3e;
            --avatar-bg-5: #281c35;
            --avatar-text-5: #c490f0;
            --avatar-bg-6: #163035;
            --avatar-text-6: #5cd6c0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background-color var(--transition-normal), color var(--transition-normal);
            min-height: 100vh;
            padding-top: var(--nav-height);
        }

        /* ========== 导航栏 ========== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--nav-height);
            background: var(--bg-nav);
            border-bottom: 1px solid var(--border-color);
            box-shadow: var(--shadow-nav);
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 8px;
            transition: background var(--transition-normal), border-color var(--transition-normal);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-primary);
            text-decoration: none;
            white-space: nowrap;
            margin-right: 4px;
            user-select: none;
        }

        .navbar-brand .brand-icon {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, #0969da, #58a6ff);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1rem;
            font-weight: 800;
            flex-shrink: 0;
        }

        .nav-tabs {
            display: flex;
            align-items: center;
            gap: 2px;
            flex: 1;
            justify-content: center;
            height: 100%;
        }

        .nav-tab {
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all var(--transition-fast);
            white-space: nowrap;
            position: relative;
            font-family: var(--font-sans);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-tab:hover {
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        .nav-tab.active {
            color: var(--accent-blue);
            font-weight: 600;
        }
        .nav-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 2px;
            background: var(--accent-blue);
            border-radius: 2px 2px 0 0;
            transition: all var(--transition-fast);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all var(--transition-fast);
            flex-shrink: 0;
            font-family: var(--font-sans);
        }
        .btn-icon:hover {
            background: var(--bg-primary);
            color: var(--text-primary);
            border-color: var(--text-tertiary);
        }
        .btn-icon:active {
            transform: scale(0.94);
        }
        .btn-icon.theme-toggle {
            font-size: 1.1rem;
            position: relative;
            overflow: hidden;
        }
        .btn-icon.theme-toggle .icon-sun,
        .btn-icon.theme-toggle .icon-moon {
            transition: all var(--transition-normal);
            position: absolute;
        }
        body:not(.dark) .btn-icon.theme-toggle .icon-moon {
            opacity: 1;
            transform: translateY(0) rotate(0);
        }
        body:not(.dark) .btn-icon.theme-toggle .icon-sun {
            opacity: 0;
            transform: translateY(20px) rotate(90deg);
            pointer-events: none;
        }
        body.dark .btn-icon.theme-toggle .icon-moon {
            opacity: 0;
            transform: translateY(-20px) rotate(-90deg);
            pointer-events: none;
        }
        body.dark .btn-icon.theme-toggle .icon-sun {
            opacity: 1;
            transform: translateY(0) rotate(0);
        }

        .btn-share {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 7px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all var(--transition-fast);
            white-space: nowrap;
            font-family: var(--font-sans);
        }
        .btn-share:hover {
            background: var(--bg-primary);
            color: var(--text-primary);
            border-color: var(--text-tertiary);
        }
        .btn-share:active {
            transform: scale(0.96);
        }
        .btn-share .share-icon {
            font-size: 0.9rem;
        }

        /* ========== 主内容区 ========== */
        .main-content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 20px 60px;
            transition: opacity var(--transition-normal);
        }

        .page-view {
            display: none;
            animation: fadeSlideIn 0.35s ease;
        }
        .page-view.active {
            display: block;
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========== 首页样式 ========== */
        .hero-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 40px 36px;
            text-align: center;
            box-shadow: var(--shadow-card);
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
            transition: all var(--transition-normal);
        }
        .hero-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #0969da, #58a6ff, #8250df, #3fb950);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        }
        .hero-card .slogan-placeholder {
            display: inline-block;
            padding: 12px 28px;
            border: 2px dashed var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-tertiary);
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all var(--transition-normal);
            cursor: default;
            user-select: none;
        }
        .hero-card .slogan-placeholder .pulse-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: var(--radius-full);
            background: var(--accent-blue);
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
                transform: scale(0.8);
            }
            50% {
                opacity: 1;
                transform: scale(1.3);
            }
        }
        .hero-card .group-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }
        .hero-card .group-subtitle {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 20px 18px;
            text-align: center;
            box-shadow: var(--shadow-card);
            transition: all var(--transition-fast);
            cursor: default;
        }
        .stat-card:hover {
            box-shadow: var(--shadow-card-hover);
            transform: translateY(-2px);
        }
        .stat-card .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-blue);
            font-family: var(--font-mono);
            letter-spacing: -1px;
        }
        .stat-card .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 4px;
            font-weight: 500;
        }

        .intro-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 24px 28px;
            box-shadow: var(--shadow-card);
            margin-bottom: 24px;
            transition: all var(--transition-normal);
        }
        .intro-card h3 {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .intro-card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.7;
        }

        .preview-section h3 {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 14px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .preview-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
        }
        .preview-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 16px 18px;
            box-shadow: var(--shadow-card);
            cursor: pointer;
            transition: all var(--transition-fast);
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .preview-card:hover {
            box-shadow: var(--shadow-card-hover);
            transform: translateY(-2px);
            border-color: var(--accent-blue);
        }
        .preview-card .preview-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-primary);
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .preview-card .preview-meta {
            font-size: 0.78rem;
            color: var(--text-tertiary);
        }
        .preview-card .preview-excerpt {
            font-size: 0.82rem;
            color: var(--text-secondary);
            margin-top: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ========== 成员页面样式 ========== */
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
            margin-top: 8px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color-subtle);
        }
        .section-header:first-of-type {
            margin-top: 0;
        }
        .section-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .section-badge.navigator {
            background: var(--accent-blue-bg);
            color: var(--accent-blue);
        }
        .section-badge.member {
            background: var(--accent-green-bg);
            color: var(--accent-green);
        }
        .section-title-text {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.2px;
        }
        .section-count {
            font-size: 0.8rem;
            color: var(--text-tertiary);
            font-weight: 400;
            margin-left: 4px;
        }

                /* 成员列表容器 - 垂直排列 */
        .members-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
            padding: 0;
            list-style: none;
        }

        /* 单个成员项 */
        .member-item {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 18px 20px;
            box-shadow: var(--shadow-card);
            transition: all var(--transition-fast);
            position: relative;
        }

        .member-item:hover {
            box-shadow: var(--shadow-card-hover);
            transform: translateY(-2px);
            border-color: var(--text-tertiary);
        }

        /* 头像 */
        .member-item .member-avatar {
            width: 52px;
            height: 52px;
            border-radius: var(--radius-full);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.3rem;
            color: #fff;
            user-select: none;
        }
        .member-item .member-avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;         /* 保持比例填满，裁剪多余部分 */
            display: block;
        }

        .member-item .avatar-fallback {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.3rem;
            color: #fff;
            user-select: none;
        }

        /* 成员信息区 */
        .member-item .member-info {
            flex: 1;
            min-width: 0;
        }

        .member-item .member-name {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-primary);
            margin-bottom: 2px;
        }
2
        .member-item .member-role {
            font-size: 0.82rem;
            color: var(--text-tertiary);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .member-item .member-bio {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* 成员标签（放在右侧或信息下方） */
        .member-item .member-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .member-tag {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .member-tag.navigator-tag {
            background: var(--accent-blue-bg);
            color: var(--accent-blue);
        }

        .member-tag.member-tag-style {
            background: var(--accent-green-bg);
            color: var(--accent-green);
        }

        /* 可选：右侧额外标签区域（如“组长”、“队长”等） */
        .member-item .member-side-tag {
            flex-shrink: 0;
            align-self: center;
            margin-left: auto;
            padding-left: 16px;
        }

        /* ========== 内容页面样式 ========== */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }
        .content-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-card);
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            flex-direction: column;
        }
        .content-card:hover {
            box-shadow: var(--shadow-card-hover);
            transform: translateY(-3px);
            border-color: var(--text-tertiary);
        }
        .content-card .card-image {
            width: 100%;
            height: 190px;
            object-fit: cover;
            display: block;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color-subtle);
        }
        .content-card .card-image-placeholder {
            width: 100%;
            height: 140px;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-card) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            border-bottom: 1px solid var(--border-color-subtle);
            color: var(--text-tertiary);
        }
        .content-card .card-body {
            padding: 16px 18px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .content-card .card-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }
        .content-card .card-excerpt {
            font-size: 0.82rem;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
            line-height: 1.5;
        }
        .content-card .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid var(--border-color-subtle);
            font-size: 0.75rem;
            color: var(--text-tertiary);
        }
        .card-footer .footer-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-footer .footer-stat {
            display: flex;
            align-items: center;
            gap: 3px;
            font-weight: 500;
        }
        .card-footer .footer-stat.heart-stat {
            color: #e74c3c;
        }

        /* ========== 模态框 ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-modal-overlay);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.2s ease;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }

            const pageViews = document.querySelectorAll('.page-view');
            const modalOverlay = document.getElementById('modalOverlay');
            const modalDialog = document.getElementById('modalDialog');
            const modalClose = document.getElementById('modalClose');
            const modalImage = document.getElementById('modalImage');
            const modalTitle = document.getElementById('modalTitle');
            const modalMeta = document.getElementById('modalMeta');
            const modalContentText = document.getElementById('modalContentText');
            const modalShareBtn = document.getElementById('modalShareBtn');
            const toast = document.getElementById('toast');
            const previewCardsContainer = document.getElementById('previewCardsContainer');
            const navigatorsGrid = document.getElementById('navigatorsGrid');
            const warriorsGrid = document.getElementById('warriorsGrid');
            const contentGrid = document.getElementById('contentGrid');

            // ============ 主题管理 ============
            function applyTheme(isDark) {
                if (isDark) {
                    body.classList.add('dark');
                } else {
                    body.classList.remove('dark');
                }
                try {
                    localStorage.setItem('theme', isDark ? 'dark' : 'light');
                } catch (e) { /* 忽略 */ }
            }

            function getSavedTheme() {
                try {
                    const saved = localStorage.getItem('theme');
                    if (saved === 'dark') return true;
                    if (saved === 'light') return false;
                } catch (e) { /* 忽略 */ }
                // 跟随系统偏好
                return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            }

            const isDark = getSavedTheme();
            applyTheme(isDark);

            themeToggle.addEventListener('click', () => {
                const newIsDark = !body.classList.contains('dark');
                applyTheme(newIsDark);
            });

            // 监听系统主题变化
            if (window.matchMedia) {
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
                    // 仅在用户未手动设置时跟随系统
                    try {
                        if (!localStorage.getItem('theme')) {
                            applyTheme(e.matches);
                        }
                    } catch (err) { /* 忽略 */ }
                });
            }

            // ============ Toast ============
            let toastTimer;

            function showToast(message) {
                clearTimeout(toastTimer);
                toast.textContent = message;
                toast.classList.add('show');
                toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }

            // ============ 分享功能 ============
            function copyToClipboard(text) {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    return navigator.clipboard.writeText(text).then(() => true).catch(() => false);
                }
                // Fallback
                return new Promise((resolve) => {
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    textarea.style.position = 'fixed';
                    textarea.style.opacity = '0';
                    textarea.style.left = '-9999px';
                    document.body.appendChild(textarea);
                    textarea.select();
                    try {
                        document.execCommand('copy');
                        resolve(true);
                    } catch (e) {
                        resolve(false);
                    }
                    document.body.removeChild(textarea);
                });
            }

            function getCurrentUrl() {
                return window.location.href;
            }

            function getContentUrl(contentId) {
                const url = new URL(window.location.href);
                url.hash = '#content/' + contentId;
                return url.toString();
            }

            async function shareCurrentPage() {
                const success = await copyToClipboard(getCurrentUrl());
                if (success) {
                    showToast('✅ 链接已复制！快去分享吧');
                } else {
                    showToast('⚠️ 复制失败，请手动复制地址栏链接');
                }
            }

            async function shareContent(contentId) {
                const url = getContentUrl(contentId);
                const success = await copyToClipboard(url);
                if (success) {
                    showToast('✅ 内容链接已复制！');
                } else {
                    showToast('⚠️ 复制失败，请重试');
                }
            }

            globalShareBtn.addEventListener('click', shareCurrentPage);
            modalShareBtn.addEventListener('click', () => {
                if (currentOpenContentId) {
                    shareContent(currentOpenContentId);
                }
            });

            // ============ 页面导航 ============
            function navigateTo(pageName) {
                // 更新导航标签
                navTabs.forEach(tab => {
                    tab.classList.toggle('active', tab.dataset.page === pageName);
                });
                // 更新页面视图
                pageViews.forEach(view => {
                    view.classList.toggle('active', view.id === 'page-' + pageName);
                });
                // 更新URL hash（不触发滚动）
                const newHash = pageName === 'home' ? '' : '#' + pageName;
                if (window.location.hash !== newHash && !(pageName === 'home' && window.location.hash ===
                        '')) {
                    history.replaceState(null, '', newHash || window.location.pathname);
                }
                // 滚动到顶部
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            navTabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const pageName = tab.dataset.page;
                    navigateTo(pageName);
                    // 关闭模态框
                    closeModal(false);
                });
            });

            // ============ 模态框管理 ============
            function openContentDetail(contentId) {
                const content = runtimeContents.find(c => c.id === contentId);
                if (!content) return;

                currentOpenContentId = contentId;

                // 填充内容
                modalTitle.textContent = content.title;
                modalMeta.innerHTML = `
                    <span>👤 ${content.author}</span>
                    <span>📅 ${content.time}</span>
                `;
                modalContentText.textContent = content.fullText;

                // 图片
                if (content.hasImage && content.imageUrl) {
                    modalImage.src = content.imageUrl;
                    modalImage.alt = content.title;
                    modalImage.style.display = 'block';
                } else {
                    modalImage.style.display = 'none';
                    modalImage.src = '';
                }

                // 更新URL hash
                const newHash = '#content/' + contentId;
                history.replaceState(null, '', newHash);

                // 显示模态框
                modalOverlay.style.display = 'flex';
                modalOverlay.setAttribute('aria-hidden', 'false');
                modalOverlay.classList.remove('closing');
                body.classList.add('modal-open');
                modalDialog.scrollTop = 0;
                // 聚焦到模态框
                setTimeout(() => modalDialog.focus(), 100);
            }

            function closeModal(updateHash = true) {
                if (modalOverlay.style.display === 'none') return;
                modalOverlay.classList.add('closing');
                setTimeout(() => {
                    modalOverlay.style.display = 'none';
                    modalOverlay.classList.remove('closing');
                    modalOverlay.setAttribute('aria-hidden', 'true');
                    body.classList.remove('modal-open');
                    currentOpenContentId = null;
                }, 180);
                if (updateHash) {
                    // 恢复到内容列表页的hash
                    const currentPage = getCurrentPageName();
                    const hash = currentPage === 'home' ? '' : '#' + currentPage;
                    history.replaceState(null, '', hash || window.location.pathname);
                }
            }

            function getCurrentPageName() {
                const activeView = document.querySelector('.page-view.active');
                if (!activeView) return 'home';
                const id = activeView.id;
                if (id === 'page-home') return 'home';
                if (id === 'page-members') return 'members';
                if (id === 'page-content') return 'content';
                return 'home';
            }

            modalClose.addEventListener('click', () => closeModal(true));
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) {
                    closeModal(true);
                }
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modalOverlay.style.display !== 'none') {
                    closeModal(true);
                }
            });


            // ============ 渲染函数 ============
            function createMemberItem(member, tagType) {
                const tagClass = tagType === 'navigator' ? 'navigator-tag' : 'member-tag-style';
                const tagText = tagType === 'navigator' ? '导航鸟' : '战队成员';
                
                // 头像部分：根据 avatarUrl 是否存在，显示图片或文字
                const avatarHtml = member.avatarUrl 
                    ? `<img class="member-avatar-img" src="${member.avatarUrl}" alt="${member.name}" onerror="this.style.display='none';this.parentElement.querySelector('.avatar-fallback').style.display='flex';">`
                    : '';
                const fallbackHtml = `<div class="avatar-fallback" style="background:${member.avatarBg};color:${member.avatarText};${member.avatarUrl ? 'display:none;' : ''}">${member.initials}</div>`;
                
                return `
                    <div class="member-item">
                        <div class="member-avatar">
                            ${avatarHtml}
                            ${fallbackHtml}
                        </div>
                        <div class="member-info">
                            <div class="member-name">${member.name}</div>
                            <div class="member-role">${member.role}</div>
                            <div class="member-bio">${member.bio}</div>
                        </div>
                    </div>
                `;
            }

            // 然后在初始化时调用
            function renderMembers() {
                document.getElementById('navigatorsList').innerHTML = navigatorsData.map(m => createMemberItem(m, 'navigator')).join('');
                document.getElementById('warriorsList').innerHTML = warriorsData.map(m => createMemberItem(m, 'warrior')).join('');
            }

            function createContentCard(content) {
                const imageHtml = content.hasImage ?
                    `<img class="card-image" src="${content.imageUrl}" alt="${content.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">` +
                    `<div class="card-image-placeholder" style="display:none;">📷</div>` :
                    `<div class="card-image-placeholder">📝</div>`;

                return `
                    <div class="content-card" data-content-id="${content.id}" role="button" tabindex="0" aria-label="查看内容: ${content.title}">
                        ${imageHtml}
                        <div class="card-body">
                            <div class="card-title">${content.title}</div>
                            <div class="card-excerpt">${content.excerpt}</div>
                            <div class="card-footer">
                                <div class="footer-left">
                                    <span>👤 ${content.author}</span>
                                    <span>📅 ${content.time}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            function refreshContentGrid() {
                contentGrid.innerHTML = runtimeContents.map(c => createContentCard(c)).join('');
                bindContentCardClicks();
            }

            function renderContentGrid() {
                refreshContentGrid();
            }

            function bindContentCardClicks() {
                const cards = contentGrid.querySelectorAll('.content-card');
                cards.forEach(card => {
                    const contentId = card.dataset.contentId;
                    card.addEventListener('click', () => {
                        navigateTo('content');
                        setTimeout(() => {
                            openContentDetail(contentId);
                        }, 150);
                    });
                    card.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            card.click();
                        }
                    });
                });
            }

            function renderPreviewCards() {
                const previews = runtimeContents.slice(0, 3);
                previewCardsContainer.innerHTML = previews.map(c => `
                    <div class="preview-card" data-content-id="${c.id}" role="button" tabindex="0" aria-label="查看: ${c.title}">
                        <div class="preview-title">${c.title}</div>
                        <div class="preview-meta">👤 ${c.author} · 📅 ${c.time}</div>
                        <div class="preview-excerpt">${c.excerpt}</div>
                    </div>
                `).join('');
                // 绑定点击事件
                previewCardsContainer.querySelectorAll('.preview-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const contentId = card.dataset.contentId;
                        navigateTo('content');
                        setTimeout(() => {
                            openContentDetail(contentId);
                        }, 150);
                    });
                    card.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            card.click();
                        }
                    });
                });
            }

            // ============ 初始化渲染 ============
            renderMembers();
            renderContentGrid();
            renderPreviewCards();

            // ============ URL Hash 路由处理 ============
            function handleHashChange() {
                const hash = window.location.hash;
                if (!hash || hash === '#home') {
                    navigateTo('home');
                    closeModal(false);
                } else if (hash === '#members') {
                    navigateTo('members');
                    closeModal(false);
                } else if (hash === '#content') {
                    navigateTo('content');
                    closeModal(false);
                } else if (hash.startsWith('#content/')) {
                    const contentId = hash.replace('#content/', '');
                    navigateTo('content');
                    // 延迟打开模态框，等页面切换完成
                    setTimeout(() => {
                        const exists = runtimeContents.some(c => c.id === contentId);
                        if (exists) {
                            openContentDetail(contentId);
                        }
                    }, 200);
                }
            }

            window.addEventListener('hashchange', handleHashChange);

            // 初始加载时处理hash
            const initialHash = window.location.hash;
            if (initialHash) {
                handleHashChange();
            }   

            // ============ 键盘导航优化 ============
            document.addEventListener('keydown', (e) => {
                // Ctrl+Shift+H 回到首页
                if (e.ctrlKey && e.shiftKey && e.key === 'H') {
                    e.preventDefault();
                    navigateTo('home');
                    closeModal(false);
                }
            });

            // ============ 初始化完成 ============
            console.log('  - 苯战队网站已就绪');
            console.log('  - 支持深色/浅色模式切换');
            console.log('  - GitHub风格卡片式布局');
            console.log('  - 内容详情支持点赞和评论');
            console.log('  - 每个页面都有分享按钮');
            console.log('  - 导航鸟：' + navigatorsData.length + '位 | 战队成员：' + warriorsData.length + '位');
            console.log('  - 精彩内容：' + runtimeContents.length + '条');
        })();
    </script>
</body>
</html>
